      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffd700" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
