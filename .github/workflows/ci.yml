name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches-ignore:
      - master
      - gh-pages

jobs:
  build:
    name: Build and verify docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn

      - name: Build
        run: yarn build
