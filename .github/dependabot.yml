version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "prism-react-renderer"
          - "@mdx-js/*"
          - "@easyops-cn/docusaurus-search-local"
        update-types:
          - minor
          - patch
      dev-tools:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
